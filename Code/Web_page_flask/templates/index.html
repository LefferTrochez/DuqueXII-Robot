<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuqueXII Control Web App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Robot image in the upper-left corner -->
    <div class="logo-section">
        <h1>DuqueXII</h1>
        <img src="{{ url_for('static', filename='DuqueXII-icon.png') }}" alt="DuqueXII Icon">
    </div>

    <div class="main-container">
        <!-- Sensor values section -->
        <div class="sensor-values" style="background-color: #D0CFCD; color: black;">
            <h3 style="font-weight: bold;">Important sensors:</h3>
            <p>Noise level: <span id="noise-level">{{ sensor_values['noise_level'] }}</span> dB</p>
            <p>Ambient temperature: <span id="ambient-temp">{{ sensor_values['ambient_temp'] }}</span> °C</p>
            <p>Body temperature: <span id="body-temp">{{ sensor_values['body_temp'] }}</span> °C</p>
            <p>Gas presence: <span id="gas-level">{{ sensor_values['gas_level'] }}</span> ppm</p>
        </div>

        <!-- Image/video section -->
        <div class="video-section">
            <img src="{{ url_for('video_feed') }}" alt="Video Stream">
        </div>
    </div>

    <!-- Warning message -->
    <div class="warning-section" style="background-color: #D0CFCD; color: black;">
        <h3 style="font-weight: bold;">Warning message:</h3>
        <p id="warning-text">{{ warning_message }}</p>
    </div>

    <!-- Movement buttons -->
    <div class="movement-buttons">
        <button onclick="move('up')">↑</button>
        <div class="middle-row">
            <button onclick="move('left')">←</button>
            <button onclick="move('stop')">◼</button>
            <button onclick="move('right')">→</button>
        </div>
        <button onclick="move('down')">↓</button>
    </div>

    <!-- Mode buttons with icons -->
    <div class="mode-buttons">
        <button onclick="setMode('active')">
            <img src="{{ url_for('static', filename='active-icon.png') }}" alt="Active Mode">
        </button>
        <button onclick="setMode('sleep')">
            <img src="{{ url_for('static', filename='sleep-icon.png') }}" alt="Sleep Mode">
        </button>
        <button onclick="clearWarning()">
            <img src="{{ url_for('static', filename='silent-icon.png') }}" alt="Silent Mode">
        </button>
    </div>

    <!-- Centered status icon -->
    <div class="centered-icon">
        <img id="status-icon" src="{{ url_for('static', filename='good-icon.png') }}" alt="Good Icon">
    </div>

    <div class="mode-buttons">
        <button onclick="fetch('/set_mode_active')">
            <img src="{{ url_for('static', filename='active-icon.png') }}" alt="Active Mode">
        </button>
        <button onclick="fetch('/set_mode_sleep')">
            <img src="{{ url_for('static', filename='sleep-icon.png') }}" alt="Sleep Mode">
        </button>
        <button onclick="fetch('/set_buzzer_off')">
            <img src="{{ url_for('static', filename='silent-icon.png') }}" alt="Silent Mode">
        </button>
    </div>

    <audio id="warningSound" src="{{ url_for('static', filename='emergency-sound.mp3') }}"></audio>

    <script>
        let isWarningActive = false;

        document.addEventListener("DOMContentLoaded", () => {
            updateValues();
            setInterval(updateValues, 100);
        });

        function handleWarning(active) {
            const warningSound = document.getElementById('warningSound');

            if (active) {
                if (!isWarningActive) {
                    if (warningSound) {
                        warningSound.play().catch(error => console.warn("Error playing sound:", error));
                    }

                    if (navigator.vibrate) {
                        navigator.vibrate([1000, 200, 1000]);
                    }

                    console.log("Active warning: sound and vibration activated.");
                }
                isWarningActive = true;
            } else {
                if (isWarningActive) {
                    if (warningSound) {
                        warningSound.pause();
                        warningSound.currentTime = 0;
                    }

                    if (navigator.vibrate) {
                        navigator.vibrate(0);
                    }

                    console.log("Warning disabled: sound and vibration stopped.");
                }
                isWarningActive = false;
            }
        }

        function updateValues() {
            fetch('/get_sensor_data')
                .then(response => response.json())
                .then(data => {
                    console.log("Received data:", data);

                    const warningTextElement = document.getElementById("warning-text");
                    warningTextElement.textContent = data.warning_message || "Everything is OK.";

                    const bodyElement = document.body;
                    const statusIcon = document.getElementById("status-icon");

                    if (data.warning_active) {
                        bodyElement.style.backgroundColor = "#d97474";
                        statusIcon.src = "{{ url_for('static', filename='bad-icon.png') }}";
                        handleWarning(true);
                    } else {
                        bodyElement.style.backgroundColor = "#9cd8a0";
                        statusIcon.src = "{{ url_for('static', filename='good-icon.png') }}";
                        handleWarning(false);
                    }

                    const sensorValuesElements = {
                        noise: document.getElementById("noise-level"),
                        ambientTemp: document.getElementById("ambient-temp"),
                        bodyTemp: document.getElementById("body-temp"),
                        gasLevel: document.getElementById("gas-level")
                    };

                    sensorValuesElements.noise.textContent = data.sensor_values.noise_level || "--";
                    sensorValuesElements.ambientTemp.textContent = data.sensor_values.ambient_temp || "--";
                    sensorValuesElements.bodyTemp.textContent = data.sensor_values.body_temp || "--";
                    sensorValuesElements.gasLevel.textContent = data.sensor_values.gas_level || "--";
                })
                .catch(error => console.error("Error updating values:", error));
        }

        function setMode(mode) {
            if (mode === 'active') {
                fetch('/set_mode_on');
            } else if (mode === 'sleep') {
                fetch('/set_mode_off');
            }
        }

        function clearWarning() {
            fetch('/buzzer_off');
        }

        function move(direction) {
            if (direction === 'up') {
                fetch('/move_up');
            } else if (direction === 'down') {
                fetch('/move_down');
            } else if (direction === 'left') {
                fetch('/move_left');
            } else if (direction === 'right') {
                fetch('/move_right');
            } else if (direction === 'stop') {
                fetch('/move_stop');
            }
        }
    </script>
</body>
</html>
